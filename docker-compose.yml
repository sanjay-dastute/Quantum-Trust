version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: quantum_admin
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: quantum_trust
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - quantum-network

  mongo:
    image: mongo:6
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secure_password
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    networks:
      - quantum-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - quantum-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=quantum_admin
      - DB_PASSWORD=secure_password
      - DB_NAME=quantum_trust
      - MONGO_URI=mongodb://admin:secure_password@mongo:27017/quantum_trust?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - mongo
      - redis
    networks:
      - quantum-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    networks:
      - quantum-network

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - quantum-network

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3002:3000"
    depends_on:
      - prometheus
    networks:
      - quantum-network

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "14250:14250"
      - "14268:14268"
    networks:
      - quantum-network

volumes:
  pgdata:
  mongodata:

networks:
  quantum-network:
    driver: bridge
